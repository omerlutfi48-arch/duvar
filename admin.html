<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUVAR // ADMIN</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #222;
  --text: #e8e8e8;
  --muted: #555;
  --red: #8b1a1a;
  --yellow: #f5c400;
  --green: #1a5c2a;
  --green-text: #4ade80;
  --white: #fff;
}

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, #141414 39px, #141414 40px);
  pointer-events: none; z-index: 0;
}

/* ── LOGIN ── */
.login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; }
.login-screen.hidden { display: none; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--yellow); padding: 2.5rem; width: min(380px, 90vw); }
.login-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.12em; color: var(--yellow); margin-bottom: 0.2rem; }
.login-sub { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 2rem; }
.login-field { margin-bottom: 1rem; }
.login-field label { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.4rem; }
.login-field input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); border-left: 2px solid var(--yellow); color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.82rem; padding: 0.65rem 0.9rem; outline: none; caret-color: var(--yellow); }
.login-field input:focus { border-color: var(--yellow); }
.login-err { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--red); min-height: 1.2rem; margin-bottom: 0.8rem; letter-spacing: 0.05em; }
.login-btn { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.15em; background: var(--yellow); color: #000; border: none; padding: 0.65rem 2rem; cursor: pointer; width: 100%; transition: opacity 0.15s; clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); }
.login-btn:hover { opacity: 0.85; }

/* ── LAYOUT ── */
.admin-wrap { position: relative; z-index: 10; max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }

/* ── HEADER ── */
.admin-header { border-bottom: 2px solid var(--yellow); padding: 2rem 0 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2.5rem; }
.admin-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.1em; color: var(--white); }
.admin-title span { color: var(--yellow); }
.admin-meta { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; }
.logout-admin { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 0.35rem 0.8rem; cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s; }
.logout-admin:hover { border-color: var(--red); color: var(--red); }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; margin-bottom: 2.5rem; }
.stat-box { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem 1.5rem; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; color: var(--white); line-height: 1; }
.stat-num.yellow { color: var(--yellow); }
.stat-num.red { color: #c0392b; }
.stat-num.green { color: var(--green-text); }
.stat-label { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.3rem; }

/* ── TABS ── */
.admin-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; gap: 0; }
.admin-tab { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; padding: 0.8rem 1.2rem; cursor: pointer; margin-bottom: -1px; transition: all 0.15s; }
.admin-tab:hover { color: var(--text); }
.admin-tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }
.admin-tab .badge { display: inline-block; background: var(--red); color: #fff; font-size: 0.5rem; padding: 0.1rem 0.4rem; margin-left: 0.4rem; border-radius: 2px; vertical-align: middle; }

/* ── SECTION ── */
.admin-section { display: none; }
.admin-section.active { display: block; }

/* ── TABLE / CARD LIST ── */
.item-list { display: flex; flex-direction: column; gap: 1px; }

.item-card { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem 1.5rem; display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: start; transition: border-color 0.15s; }
.item-card:hover { border-color: #333; }
.item-card.flagged { border-left: 3px solid var(--yellow); }
.item-card.banned { border-left: 3px solid var(--red); opacity: 0.5; }
.item-card.pinned { border-left: 3px solid var(--green-text); }

.item-meta { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.5rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }
.item-meta .author { color: var(--yellow); }
.item-meta .time { color: #333; }
.item-meta .type-badge { color: #666; border: 1px solid #222; padding: 0.1rem 0.4rem; }

.item-text { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #ccc; line-height: 1.7; letter-spacing: 0.02em; margin-bottom: 0.6rem; }

.item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
.action-btn { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.08em; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.7rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.action-btn:hover { border-color: #555; color: var(--text); }
.action-btn.danger { border-color: #3a1a1a; color: #c0392b; }
.action-btn.danger:hover { background: #2a0a0a; border-color: var(--red); }
.action-btn.success { border-color: #1a3a1a; color: var(--green-text); }
.action-btn.success:hover { background: #0a1a0a; }
.action-btn.warn { border-color: #3a3a00; color: var(--yellow); }
.action-btn.warn:hover { background: #1a1a00; }

.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
.report-count { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--yellow); border: 1px solid #3a3a00; padding: 0.2rem 0.5rem; background: #1a1a00; white-space: nowrap; }

/* ── REPORT ITEMS ── */
.report-card { background: var(--surface); border: 1px solid #2a1a00; border-left: 3px solid var(--yellow); padding: 1.2rem 1.5rem; margin-bottom: 1px; }
.report-card.resolved { border-left-color: #2a2a2a; opacity: 0.5; }
.report-reason { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--yellow); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.report-post-preview { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: #888; line-height: 1.6; border-left: 2px solid #2a2a2a; padding-left: 0.8rem; margin: 0.6rem 0; font-style: italic; }
.report-meta { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 0.8rem; }

/* ── USER LIST ── */
.user-card { background: var(--surface); border: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1px; transition: border-color 0.15s; }
.user-card:hover { border-color: #333; }
.user-card.banned-user { border-left: 3px solid var(--red); opacity: 0.6; }
.user-nick-display { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--yellow); letter-spacing: 0.08em; }
.user-nick-display::before { content: '@'; color: var(--muted); }
.user-stats-row { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; display: flex; gap: 1rem; margin-top: 0.2rem; }

/* ── EMPTY ── */
.empty-msg { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: #333; letter-spacing: 0.08em; padding: 2rem; text-align: center; border: 1px dashed #1a1a1a; }

/* ── SEARCH ── */
.search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-left: 2px solid var(--muted); color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 0.6rem 0.9rem; outline: none; caret-color: var(--yellow); }
.search-bar input:focus { border-color: var(--yellow); }

/* ── CONFIRM MODAL ── */
.confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 800; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.confirm-modal.hidden { display: none; }
.confirm-box { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--red); padding: 2rem; width: min(360px, 90vw); }
.confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; color: var(--red); margin-bottom: 0.5rem; }
.confirm-msg { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
.confirm-actions { display: flex; gap: 0.5rem; }
.confirm-ok { flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.12em; background: var(--red); color: #fff; border: none; padding: 0.6rem; cursor: pointer; clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%); }
.confirm-ok:hover { background: #a82020; }
.confirm-cancel { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.15s; }
.confirm-cancel:hover { border-color: #555; color: var(--text); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 2rem; right: 2rem; font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; background: var(--yellow); color: #000; padding: 0.7rem 1.2rem; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
.toast.show { opacity: 1; transform: translateY(0); }

.ilan-label { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.35rem; }
.ilan-input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 0.5rem 0.8rem; outline: none; caret-color: var(--yellow); }
.ilan-input:focus { border-color: var(--yellow); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #222; }
::-webkit-scrollbar-thumb:hover { background: var(--yellow); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">// ADMIN</div>
    <div class="login-sub">duvar · moderasyon paneli · yetkisiz giriş yasaktır</div>
    <div class="login-field">
      <label>admin şifresi</label>
      <input type="password" id="adminPass" placeholder="••••••••" maxlength="50" autofocus>
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="adminLogin()">GİRİŞ</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal hidden" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">EMİN MİSİN?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="confirm-ok" id="confirmOk">EVET, DEVAM ET</button>
      <button class="confirm-cancel" onclick="closeConfirm()">iptal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ADMIN PANEL -->
<div class="admin-wrap">
  <div class="admin-header">
    <div>
      <div class="admin-title">DUVAR // <span>ADMİN</span></div>
      <div class="admin-meta" id="adminMeta">// moderasyon paneli</div>
    </div>
    <button class="logout-admin" onclick="adminLogout()">çıkış yap</button>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box"><div class="stat-num" id="statPosts">—</div><div class="stat-label">toplam gönderi</div></div>
    <div class="stat-box"><div class="stat-num" id="statUsers">—</div><div class="stat-label">kayıtlı kullanıcı</div></div>
    <div class="stat-box"><div class="stat-num yellow" id="statReports">—</div><div class="stat-label">bekleyen şikayet</div></div>
    <div class="stat-box"><div class="stat-num red" id="statBanned">—</div><div class="stat-label">banlı kullanıcı</div></div>
    <div class="stat-box"><div class="stat-num green" id="statAcil">—</div><div class="stat-label">acil gönderi</div></div>
    <div class="stat-box"><div class="stat-num yellow" id="statFeedback">—</div><div class="stat-label">geri bildirim</div></div>
  </div>

  <!-- TABS -->
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('reports')" id="tab-reports">şikayetler <span class="badge" id="reportBadge">0</span></button>
    <button class="admin-tab" onclick="switchTab('posts')" id="tab-posts">gönderiler</button>
    <button class="admin-tab" onclick="switchTab('users')" id="tab-users">kullanıcılar</button>
    <button class="admin-tab" onclick="switchTab('feedback')" id="tab-feedback">geri bildirimler <span class="badge" id="feedbackBadge">0</span></button>
    <button class="admin-tab" onclick="switchTab('ilanlar')" id="tab-ilanlar">ilanlar</button>
    <button class="admin-tab" onclick="switchTab('etkinlik')" id="tab-etkinlik">etkinlikler</button>
  </div>

  <!-- REPORTS SECTION -->
  <div class="admin-section active" id="section-reports">
    <div id="reportsList"></div>
  </div>

  <!-- POSTS SECTION -->
  <div class="admin-section" id="section-posts">
    <div class="search-bar">
      <input type="text" id="postSearch" placeholder="gönderi ara..." oninput="renderPosts()">
    </div>
    <div id="postsList"></div>
  </div>

  <!-- USERS SECTION -->
  <div class="admin-section" id="section-users">
    <div class="search-bar">
      <input type="text" id="userSearch" placeholder="kullanıcı ara..." oninput="renderUsers()">
    </div>
    <div id="usersList"></div>
  </div>

  <!-- ETKİNLİK SECTION -->
  <div class="admin-section" id="section-etkinlik">
    <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid #c084fc;padding:1.5rem;margin-bottom:2rem">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:#c084fc;margin-bottom:1.2rem">+ YENİ ETKİNLİK / DUYURU EKLE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem">
        <div><label class="ilan-label">BAŞLIK</label><input class="ilan-input" id="etkinlikBaslik" type="text" placeholder="örn: UAA Öğrenci Yarışması 2026" maxlength="100"></div>
        <div><label class="ilan-label">ORGANİZATÖR</label><input class="ilan-input" id="etkinlikOrg" type="text" placeholder="örn: Mimarlar Odası" maxlength="80"></div>
        <div><label class="ilan-label">ŞEHİR / KONUM</label><input class="ilan-input" id="etkinlikSehir" type="text" placeholder="örn: Ankara / Online" maxlength="60"></div>
        <div><label class="ilan-label">TİP</label><select class="ilan-input" id="etkinlikTip"><option value="yarisma">Yarışma</option><option value="festival">Festival</option><option value="etkinlik">Etkinlik</option><option value="workshop">Workshop</option><option value="seminer">Seminer</option></select></div>
        <div><label class="ilan-label">ETKİNLİK TARİHİ</label><input class="ilan-input" id="etkinlikTarih" type="date"></div>
        <div><label class="ilan-label">SON BAŞVURU TARİHİ</label><input class="ilan-input" id="etkinlikSon" type="date"></div>
        <div style="grid-column:1/-1"><label class="ilan-label">BAŞVURU / BİLGİ LİNKİ</label><input class="ilan-input" id="etkinlikLink" type="text" placeholder="örn: mimarlarodasi.org/yarisma" maxlength="200"></div>
      </div>
      <div style="margin-bottom:.8rem"><label class="ilan-label">AÇIKLAMA</label><textarea class="ilan-input" id="etkinlikAciklama" rows="3" maxlength="600" placeholder="Etkinlik detayları, katılım koşulları..." style="resize:vertical;width:100%"></textarea></div>
      <button class="login-btn" style="width:auto;padding:.55rem 2rem;background:#7c3aed" onclick="etkinlikEkle()">DUYURUYU YAYINLA</button>
    </div>
    <div id="etkinlikAdminList"></div>
  </div>

  <!-- FEEDBACK SECTION -->
  <div class="admin-section" id="section-feedback">
    <div id="feedbackList"></div>
  </div>

  <!-- İLANLAR SECTION -->
  <div class="admin-section" id="section-ilanlar">
    <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--yellow);padding:1.5rem;margin-bottom:2rem">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:var(--yellow);margin-bottom:1.2rem">+ YENİ İLAN EKLE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem" id="ilanFormGrid">
        <div><label class="ilan-label">OFİS ADI</label><input class="ilan-input" id="ilanOfis" type="text" placeholder="örn: Studio KMPKT" maxlength="60"></div>
        <div><label class="ilan-label">BAŞLIK</label><input class="ilan-input" id="ilanBaslik" type="text" placeholder="örn: Mimarlık Stajyeri" maxlength="80"></div>
        <div><label class="ilan-label">ŞEHİR</label><input class="ilan-input" id="ilanSehir" type="text" placeholder="örn: İstanbul" maxlength="40"></div>
        <div><label class="ilan-label">TİP</label><select class="ilan-input" id="ilanTip"><option value="staj">Staj</option><option value="tam">Tam Zamanlı</option><option value="yari">Yarı Zamanlı</option></select></div>
        <div><label class="ilan-label">SON BAŞVURU TARİHİ</label><input class="ilan-input" id="ilanSon" type="date"></div>
        <div><label class="ilan-label">İLETİŞİM (e-posta / link)</label><input class="ilan-input" id="ilanIletisim" type="text" placeholder="örn: kariyer@ofis.com" maxlength="120"></div>
      </div>
      <div style="margin-bottom:.8rem"><label class="ilan-label">AÇIKLAMA</label><textarea class="ilan-input" id="ilanAciklama" rows="3" maxlength="600" placeholder="Pozisyon detayları, beklentiler, süre..." style="resize:vertical;width:100%"></textarea></div>
      <button class="login-btn" style="width:auto;padding:.55rem 2rem" onclick="ilanEkle()">İLANI YAYINLA</button>
    </div>
    <div id="ilanlarAdminList"></div>
  </div>
</div>

<script>
// ── ADMIN ŞIFRESI ──
// Şifreyi değiştirmek için: https://emn178.github.io/online-tools/sha256.html
// adresine git, yeni şifreni gir ve hash'i buraya yapıştır.
// Varsayılan şifre: "duvar2025"
const ADMIN_PASS_HASH = 'bba7ab482faeb26ed4faec5f89029c70f23580b59a2618a215eb1b68dc5fe15e';

// ── STORAGE ──
const USERS_KEY = 'duvar_users';
const POSTS_KEY = 'duvar_posts';
const REPORTS_KEY = 'duvar_reports';
const BANNED_KEY = 'duvar_banned';
const PINNED_KEY = 'duvar_pinned';
const RESOLVED_KEY = 'duvar_resolved';
const FEEDBACK_KEY = 'duvar_feedback';
const FEEDBACK_READ_KEY = 'duvar_feedback_read';
const ILANLAR_KEY = 'duvar_ilanlar';
const ETKINLIK_KEY = 'duvar_etkinlikler';

function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; } }
function getPosts() { try { return JSON.parse(localStorage.getItem(POSTS_KEY)) || []; } catch { return []; } }
function savePosts(p) { localStorage.setItem(POSTS_KEY, JSON.stringify(p)); }
function getReports() { try { return JSON.parse(localStorage.getItem(REPORTS_KEY)) || []; } catch { return []; } }
function saveReports(r) { localStorage.setItem(REPORTS_KEY, JSON.stringify(r)); }
function getBanned() { try { return JSON.parse(localStorage.getItem(BANNED_KEY)) || []; } catch { return []; } }
function saveBanned(b) { localStorage.setItem(BANNED_KEY, JSON.stringify(b)); }
function getPinned() { try { return JSON.parse(localStorage.getItem(PINNED_KEY)) || []; } catch { return []; } }
function savePinned(p) { localStorage.setItem(PINNED_KEY, JSON.stringify(p)); }
function getResolved() { try { return JSON.parse(localStorage.getItem(RESOLVED_KEY)) || []; } catch { return []; } }
function saveResolved(r) { localStorage.setItem(RESOLVED_KEY, JSON.stringify(r)); }
function getFeedback() { try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY)) || []; } catch { return []; } }
function saveFeedback(f) { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(f)); }
function getFeedbackRead() { try { return JSON.parse(localStorage.getItem(FEEDBACK_READ_KEY)) || []; } catch { return []; } }
function saveFeedbackRead(r) { localStorage.setItem(FEEDBACK_READ_KEY, JSON.stringify(r)); }
function getIlanlar() { try { return JSON.parse(localStorage.getItem(ILANLAR_KEY)) || []; } catch { return []; } }
function saveIlanlar(i) { localStorage.setItem(ILANLAR_KEY, JSON.stringify(i)); }
function getEtkinlikler() { try { return JSON.parse(localStorage.getItem(ETKINLIK_KEY)) || []; } catch { return []; } }
function saveEtkinlikler(e) { localStorage.setItem(ETKINLIK_KEY, JSON.stringify(e)); }

// ── AUTH ──
let isAdmin = false;

async function adminLogin() {
  const pass = document.getElementById('adminPass').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  const hash = Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2,'0')).join('');
  if (hash === ADMIN_PASS_HASH) {
    isAdmin = true;
    sessionStorage.setItem('duvar_admin', '1');
    document.getElementById('loginScreen').classList.add('hidden');
    initPanel();
  } else {
    document.getElementById('loginErr').textContent = '// şifre yanlış';
    document.getElementById('adminPass').value = '';
  }
}

function adminLogout() {
  sessionStorage.removeItem('duvar_admin');
  location.reload();
}

document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

// ── INIT ──
function initPanel() {
  updateStats();
  renderReports();
  renderPosts();
  renderUsers();
  renderFeedback();
  renderIlanlarAdmin();
  renderEtkinlikAdmin();
  document.getElementById('adminMeta').textContent = `// giriş yapıldı · ${new Date().toLocaleString('tr-TR')}`;
}

function updateStats() {
  const posts = getPosts();
  const users = getUsers();
  const reports = getReports();
  const banned = getBanned();
  const resolved = getResolved();
  const pending = reports.filter(r => !resolved.includes(r.postId + '_' + r.time)).length;
  const acil = posts.filter(p => p.type === 'acil').length;

  document.getElementById('statPosts').textContent = posts.length;
  document.getElementById('statUsers').textContent = Object.keys(users).length;
  document.getElementById('statReports').textContent = pending;
  document.getElementById('statBanned').textContent = banned.length;
  document.getElementById('statAcil').textContent = acil;
  document.getElementById('reportBadge').textContent = pending;
  const feedbackAll = getFeedback();
  const feedbackRead = new Set(getFeedbackRead());
  const feedbackPending = feedbackAll.filter(f => !feedbackRead.has(f.id)).length;
  document.getElementById('statFeedback').textContent = feedbackAll.length;
  document.getElementById('feedbackBadge').textContent = feedbackPending;
}

// ── TABS ──
function switchTab(tab) {
  ['reports','posts','users','feedback','ilanlar','etkinlik'].forEach(t => {
    document.getElementById('section-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

// ── REPORTS ──
function renderReports() {
  const reports = getReports();
  const resolved = getResolved();
  const posts = getPosts();
  const el = document.getElementById('reportsList');

  if (!reports.length) {
    el.innerHTML = '<div class="empty-msg">// şikayet yok</div>';
    return;
  }

  const reasonLabels = { hakaret: 'hakaret / aşağılama', tehdit: 'tehdit / taciz', kisisel_veri: 'kişisel bilgi ifşası', zarar: 'zarar verici içerik', diger: 'diğer' };
  const resolvedKeys = new Set(resolved);

  el.innerHTML = [...reports].reverse().map((r, i) => {
    const key = r.postId + '_' + r.time;
    const isResolved = resolvedKeys.has(key);
    const post = posts.find(p => p.id === r.postId);
    const preview = post ? post.text.slice(0, 120) + (post.text.length > 120 ? '...' : '') : '[gönderi silinmiş]';
    return `
    <div class="report-card ${isResolved ? 'resolved' : ''}">
      <div class="report-reason">⚑ ${reasonLabels[r.reason] || r.reason}</div>
      <div class="report-meta">bildiren: @${esc(r.by || '?')} · ${new Date(r.time).toLocaleString('tr-TR')}</div>
      <div class="report-post-preview">"${esc(preview)}"</div>
      <div class="item-actions">
        ${!isResolved ? `
          <button class="action-btn warn" onclick="resolveReport('${key}')">✓ çözüldü işaretle</button>
          ${post ? `<button class="action-btn danger" onclick="confirmDeletePost(${r.postId})">gönderiyi sil</button>` : ''}
          ${post ? `<button class="action-btn danger" onclick="confirmBan('${post.author}')">@${esc(post?.author||'?')} banla</button>` : ''}
        ` : '<span style="font-family:Space Mono,monospace;font-size:0.6rem;color:#333;letter-spacing:0.08em">// çözüldü</span>'}
      </div>
    </div>`;
  }).join('');
}

function resolveReport(key) {
  const resolved = getResolved();
  if (!resolved.includes(key)) resolved.push(key);
  saveResolved(resolved);
  updateStats();
  renderReports();
  toast('// şikayet çözüldü olarak işaretlendi');
}

// ── POSTS ──
function renderPosts() {
  const posts = getPosts();
  const banned = getBanned();
  const pinned = getPinned();
  const q = (document.getElementById('postSearch')?.value || '').toLowerCase();
  const el = document.getElementById('postsList');

  const filtered = posts.filter(p =>
    !q || p.text.toLowerCase().includes(q) || p.author.toLowerCase().includes(q)
  );

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-msg">// gönderi yok</div>';
    return;
  }

  const typeLabels = { dert:'// dert', soru:'? soru', kaynak:'↗ kaynak', acil:'! acil' };
  const moodLabels = { yorgun:'😮‍💨 yorgunum', yardim:'🆘 yardım lazım', iyi:'✓ iyiyim', tesekkur:'♡ teşekkür' };

  el.innerHTML = filtered.map(p => {
    const isBanned = banned.includes(p.author);
    const isPinned = pinned.includes(p.id);
    const reports = getReports().filter(r => r.postId === p.id).length;
    return `
    <div class="item-card ${isPinned ? 'pinned' : ''} ${isBanned ? 'banned' : ''} ${p.type === 'acil' ? 'flagged' : ''}">
      <div>
        <div class="item-meta">
          <span class="author">@${esc(p.author)}</span>
          <span class="time">${p.time}</span>
          ${p.type ? `<span class="type-badge">${typeLabels[p.type]||p.type}</span>` : ''}
          ${p.mood ? `<span class="type-badge">${moodLabels[p.mood]||p.mood}</span>` : ''}
          ${isPinned ? '<span style="color:#4ade80;border:1px solid #1a3a1a;padding:0.1rem 0.4rem">📌 sabitlendi</span>' : ''}
        </div>
        <div class="item-text">${esc(p.text)}</div>
        <div class="item-actions">
          <button class="action-btn ${isPinned ? 'success' : 'success'}" onclick="togglePin(${p.id})">${isPinned ? '📌 sabiti kaldır' : '📌 sabitle (acil)'}</button>
          <button class="action-btn danger" onclick="confirmDeletePost(${p.id})">🗑 sil</button>
          <button class="action-btn danger" onclick="confirmBan('${p.author}')">🚫 @${esc(p.author)} banla</button>
        </div>
      </div>
      <div class="item-right">
        ${reports > 0 ? `<div class="report-count">⚑ ${reports} şikayet</div>` : ''}
        <div style="font-family:Space Mono,monospace;font-size:0.58rem;color:#333">↳ ${p.comments?.length||0} yorum</div>
        <div style="font-family:Space Mono,monospace;font-size:0.58rem;color:#333">⚡ ${p.fire||0} · ◎ ${p.hug||0}</div>
      </div>
    </div>`;
  }).join('');
}

function togglePin(id) {
  const pinned = getPinned();
  const idx = pinned.indexOf(id);
  if (idx > -1) pinned.splice(idx, 1);
  else pinned.push(id);
  savePinned(pinned);
  // Ana sitede de göster
  const posts = getPosts();
  const post = posts.find(p => p.id === id);
  if (post) { post.pinned = !post.pinned; savePosts(posts); }
  renderPosts();
  toast(pinned.includes(id) ? '// gönderi sabitlendi' : '// sabit kaldırıldı');
}

// ── USERS ──
function renderUsers() {
  const users = getUsers();
  const banned = getBanned();
  const posts = getPosts();
  const q = (document.getElementById('userSearch')?.value || '').toLowerCase();
  const el = document.getElementById('usersList');

  const nickList = Object.keys(users).filter(n => !q || n.includes(q));

  if (!nickList.length) {
    el.innerHTML = '<div class="empty-msg">// kullanıcı yok</div>';
    return;
  }

  el.innerHTML = nickList.map(nick => {
    const isBanned = banned.includes(nick);
    const postCount = posts.filter(p => p.author === nick).length;
    const reportCount = getReports().filter(r => {
      const p = posts.find(x => x.id === r.postId);
      return p && p.author === nick;
    }).length;
    return `
    <div class="user-card ${isBanned ? 'banned-user' : ''}">
      <div>
        <div class="user-nick-display">${esc(nick)}</div>
        <div class="user-stats-row">
          <span>${postCount} gönderi</span>
          ${reportCount > 0 ? `<span style="color:var(--yellow)">⚑ ${reportCount} şikayet</span>` : ''}
          ${isBanned ? '<span style="color:var(--red)">🚫 banlı</span>' : ''}
        </div>
      </div>
      <div class="item-actions">
        <button class="action-btn ${isBanned ? 'success' : 'danger'}" onclick="toggleBan('${nick}')">
          ${isBanned ? '✓ banı kaldır' : '🚫 banla'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function confirmDeletePost(id) {
  openConfirm(
    'GÖNDERİYİ SİL',
    '// bu gönderi kalıcı olarak silinecek. geri alınamaz.',
    () => deletePost(id)
  );
}

function confirmBan(nick) {
  const banned = getBanned();
  if (banned.includes(nick)) {
    toggleBan(nick); return;
  }
  openConfirm(
    `@${nick.toUpperCase()} BANLA`,
    `// bu kullanıcı platforma erişemeyecek. şifresi geçersiz sayılacak.`,
    () => toggleBan(nick)
  );
}

function deletePost(id) {
  const posts = getPosts().filter(p => p.id !== id);
  savePosts(posts);
  updateStats();
  renderPosts();
  renderReports();
  toast('// gönderi silindi');
}

function toggleBan(nick) {
  const banned = getBanned();
  const idx = banned.indexOf(nick);
  if (idx > -1) { banned.splice(idx, 1); toast(`// @${nick} ban kaldırıldı`); }
  else { banned.push(nick); toast(`// @${nick} banlı`); }
  saveBanned(banned);
  // Users tablosuna da işaretle
  const users = getUsers();
  if (users[nick]) { users[nick].banned = !users[nick].banned; }
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  updateStats();
  renderUsers();
  renderPosts();
}

// ── CONFIRM MODAL ──
let confirmCallback = null;
function openConfirm(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirmModal').classList.remove('hidden');
}
function closeConfirm() {
  document.getElementById('confirmModal').classList.add('hidden');
  confirmCallback = null;
}
document.getElementById('confirmOk').onclick = () => {
  if (confirmCallback) confirmCallback();
  closeConfirm();
};

// ── FEEDBACK ──
function renderFeedback() {
  const items = getFeedback();
  const readIds = new Set(getFeedbackRead());
  const el = document.getElementById('feedbackList');
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg">// henüz geri bildirim yok</div>';
    return;
  }
  const typeLabel = { oneri: '💡 öneri', sikayet: '⚑ şikayet' };
  el.innerHTML = [...items].reverse().map(f => {
    const isRead = readIds.has(f.id);
    return `<div class="report-card ${isRead ? 'resolved' : ''}">
      <div class="report-reason">${typeLabel[f.type] || f.type}</div>
      <div class="report-meta">@${esc(f.nick)} · ${new Date(f.time).toLocaleString('tr-TR')}</div>
      <div class="item-text" style="margin:0.5rem 0">${esc(f.text)}</div>
      <div class="item-actions">
        ${!isRead ? `<button class="action-btn warn" onclick="markFeedbackRead(${f.id})">✓ okundu</button>` : '<span style="font-family:Space Mono,monospace;font-size:0.6rem;color:#333;letter-spacing:0.08em">// okundu</span>'}
        <button class="action-btn danger" onclick="deleteFeedback(${f.id})">🗑 sil</button>
      </div>
    </div>`;
  }).join('');
}
function markFeedbackRead(id) {
  const read = getFeedbackRead();
  if (!read.includes(id)) read.push(id);
  saveFeedbackRead(read);
  updateStats();
  renderFeedback();
  toast('// okundu işaretlendi');
}
// ── ETKİNLİKLER ──
function etkinlikEkle() {
  const baslik = document.getElementById('etkinlikBaslik').value.trim();
  const organizator = document.getElementById('etkinlikOrg').value.trim();
  const aciklama = document.getElementById('etkinlikAciklama').value.trim();
  const sehir = document.getElementById('etkinlikSehir').value.trim();
  const tip = document.getElementById('etkinlikTip').value;
  const etkinlikTarih = document.getElementById('etkinlikTarih').value;
  const son = document.getElementById('etkinlikSon').value;
  const link = document.getElementById('etkinlikLink').value.trim();
  if (!baslik || !aciklama) { toast('// başlık ve açıklama zorunlu'); return; }
  const liste = getEtkinlikler();
  liste.push({ id: Date.now(), baslik, organizator, aciklama, sehir, tip, etkinlikTarih, son, link, eklenme: new Date().toISOString(), arsiv: false });
  saveEtkinlikler(liste);
  ['etkinlikBaslik','etkinlikOrg','etkinlikAciklama','etkinlikSehir','etkinlikTarih','etkinlikSon','etkinlikLink'].forEach(id => document.getElementById(id).value = '');
  renderEtkinlikAdmin();
  toast('// etkinlik yayınlandı');
}
function etkinlikSil(id) {
  saveEtkinlikler(getEtkinlikler().filter(e => e.id !== id));
  renderEtkinlikAdmin();
  toast('// etkinlik silindi');
}
function etkinlikArsiv(id) {
  const liste = getEtkinlikler();
  const e = liste.find(x => x.id === id);
  if (e) e.arsiv = !e.arsiv;
  saveEtkinlikler(liste);
  renderEtkinlikAdmin();
  toast(e?.arsiv ? '// arşivlendi' : '// yeniden yayınlandı');
}
function renderEtkinlikAdmin() {
  const liste = getEtkinlikler();
  const el = document.getElementById('etkinlikAdminList');
  if (!liste.length) { el.innerHTML = '<div class="empty-msg">// henüz etkinlik yok</div>'; return; }
  const tipLabel = { yarisma: 'yarışma', festival: 'festival', etkinlik: 'etkinlik', workshop: 'workshop', seminer: 'seminer' };
  el.innerHTML = [...liste].reverse().map(e => `
    <div class="item-card ${e.arsiv ? 'banned' : ''}">
      <div>
        <div class="item-meta">
          <span class="author">${esc(e.baslik)}</span>
          <span class="type-badge">${tipLabel[e.tip]||e.tip}</span>
          ${e.organizator ? `<span>${esc(e.organizator)}</span>` : ''}
          ${e.sehir ? `<span>${esc(e.sehir)}</span>` : ''}
          ${e.etkinlikTarih ? `<span>📅 ${new Date(e.etkinlikTarih).toLocaleDateString('tr-TR')}</span>` : ''}
          ${e.son ? `<span>⏳ son: ${new Date(e.son).toLocaleDateString('tr-TR')}</span>` : ''}
          ${e.arsiv ? '<span style="color:#555">arşiv</span>' : ''}
        </div>
        <div class="item-text">${esc(e.aciklama.slice(0,120))}${e.aciklama.length>120?'...':''}</div>
        ${e.link ? `<div style="font-family:Space Mono,monospace;font-size:0.62rem;color:#c084fc;margin-bottom:0.5rem">${esc(e.link)}</div>` : ''}
        <div class="item-actions">
          <button class="action-btn warn" onclick="etkinlikArsiv(${e.id})">${e.arsiv ? '↺ yeniden yayınla' : '📦 arşivle'}</button>
          <button class="action-btn danger" onclick="etkinlikSil(${e.id})">🗑 sil</button>
        </div>
      </div>
    </div>`).join('');
}

// ── İLANLAR ──
function ilanEkle() {
  const ofis = document.getElementById('ilanOfis').value.trim();
  const baslik = document.getElementById('ilanBaslik').value.trim();
  const aciklama = document.getElementById('ilanAciklama').value.trim();
  const sehir = document.getElementById('ilanSehir').value.trim();
  const tip = document.getElementById('ilanTip').value;
  const son = document.getElementById('ilanSon').value;
  const iletisim = document.getElementById('ilanIletisim').value.trim();
  if (!ofis || !baslik || !aciklama) { toast('// ofis adı, başlık ve açıklama zorunlu'); return; }
  const ilanlar = getIlanlar();
  ilanlar.push({ id: Date.now(), ofis, baslik, aciklama, sehir, tip, son, iletisim, tarih: new Date().toISOString(), arsiv: false });
  saveIlanlar(ilanlar);
  ['ilanOfis','ilanBaslik','ilanAciklama','ilanSehir','ilanSon','ilanIletisim'].forEach(id => document.getElementById(id).value = '');
  renderIlanlarAdmin();
  toast('// ilan yayınlandı');
}
function ilanSil(id) {
  saveIlanlar(getIlanlar().filter(il => il.id !== id));
  renderIlanlarAdmin();
  toast('// ilan silindi');
}
function ilanArsiv(id) {
  const ilanlar = getIlanlar();
  const il = ilanlar.find(x => x.id === id);
  if (il) il.arsiv = !il.arsiv;
  saveIlanlar(ilanlar);
  renderIlanlarAdmin();
  toast(il?.arsiv ? '// ilan arşivlendi' : '// ilan yeniden yayınlandı');
}
function renderIlanlarAdmin() {
  const ilanlar = getIlanlar();
  const el = document.getElementById('ilanlarAdminList');
  if (!ilanlar.length) { el.innerHTML = '<div class="empty-msg">// henüz ilan yok</div>'; return; }
  const tipLabel = { staj: 'staj', tam: 'tam zamanlı', yari: 'yarı zamanlı' };
  el.innerHTML = [...ilanlar].reverse().map(il => `
    <div class="item-card ${il.arsiv ? 'banned' : ''}">
      <div>
        <div class="item-meta">
          <span class="author">${esc(il.ofis)}</span>
          <span class="type-badge">${tipLabel[il.tip]||il.tip}</span>
          ${il.sehir ? `<span>${esc(il.sehir)}</span>` : ''}
          ${il.son ? `<span>son: ${new Date(il.son).toLocaleDateString('tr-TR')}</span>` : ''}
          ${il.arsiv ? '<span style="color:#555">arşiv</span>' : ''}
        </div>
        <div class="item-text">${esc(il.baslik)} — ${esc(il.aciklama.slice(0,100))}${il.aciklama.length>100?'...':''}</div>
        ${il.iletisim ? `<div style="font-family:Space Mono,monospace;font-size:0.62rem;color:var(--yellow);margin-bottom:0.5rem">${esc(il.iletisim)}</div>` : ''}
        <div class="item-actions">
          <button class="action-btn warn" onclick="ilanArsiv(${il.id})">${il.arsiv ? '↺ yeniden yayınla' : '📦 arşivle'}</button>
          <button class="action-btn danger" onclick="ilanSil(${il.id})">🗑 sil</button>
        </div>
      </div>
    </div>`).join('');
}

function deleteFeedback(id) {
  saveFeedback(getFeedback().filter(f => f.id !== id));
  const read = getFeedbackRead().filter(x => x !== id);
  saveFeedbackRead(read);
  updateStats();
  renderFeedback();
  toast('// geri bildirim silindi');
}

// ── UTILS ──
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── AUTO LOGIN (session) ──
if (sessionStorage.getItem('duvar_admin') === '1') {
  isAdmin = true;
  document.getElementById('loginScreen').classList.add('hidden');
  initPanel();
}
</script>
