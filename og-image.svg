<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background lines texture -->
    <pattern id="lines" x="0" y="0" width="1200" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="39" x2="1200" y2="39" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>

    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#lines)" opacity="1"/>

  <!-- Left red accent bar -->
  <rect x="80" y="80" width="4" height="470" fill="#8b1a1a"/>

  <!-- Top label -->
  <text x="104" y="122" font-family="monospace" font-size="13" fill="#555" letter-spacing="4">// MİMARLIK ÖĞRENCİLERİ · ANONİM · YARDIMLAŞMA</text>

  <!-- Main title DUVAR -->
  <text x="96" y="340" font-family="Impact, Arial Black, sans-serif" font-size="260" fill="#ffffff" letter-spacing="8" opacity="0.97">DUVAR</text>

  <!-- Red underline slash accent -->
  <rect x="96" y="358" width="560" height="5" fill="#8b1a1a"/>

  <!-- Tagline -->
  <text x="104" y="420" font-family="monospace" font-size="18" fill="#666" letter-spacing="2">dert anlat. soru sor. kaynak paylaş.</text>

  <!-- Bottom row badges -->
  <!-- badge 1 -->
  <rect x="104" y="480" width="130" height="30" fill="none" stroke="#2a1a1a" stroke-width="1"/>
  <text x="169" y="500" font-family="monospace" font-size="11" fill="#8b1a1a" text-anchor="middle" letter-spacing="2">ANONİM</text>

  <!-- badge 2 -->
  <rect x="248" y="480" width="130" height="30" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="313" y="500" font-family="monospace" font-size="11" fill="#555" text-anchor="middle" letter-spacing="2">YARGISIZ</text>

  <!-- badge 3 -->
  <rect x="392" y="480" width="130" height="30" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="457" y="500" font-family="monospace" font-size="11" fill="#555" text-anchor="middle" letter-spacing="2">24/7</text>

  <!-- Bottom domain -->
  <text x="1120" y="580" font-family="monospace" font-size="13" fill="#2a2a2a" text-anchor="end" letter-spacing="2">duvar.app</text>

  <!-- Corner tick marks -->
  <line x1="60" y1="60" x2="60" y2="90" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="60" x2="90" y2="60" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="1140" y1="60" x2="1140" y2="90" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="1140" y1="60" x2="1110" y2="60" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="570" x2="60" y2="540" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="570" x2="90" y2="570" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="1140" y1="570" x2="1140" y2="540" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="1140" y1="570" x2="1110" y2="570" stroke="#2a2a2a" stroke-width="1"/>
</svg>
